<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc Mừng Sinh Nhật Chị Yêu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.15);
      padding: 50px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      color: white;
      z-index: 2;
      max-width: 700px;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #fff7d6;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 15px;
    }

    .heart {
      font-size: 60px;
      animation: beat 1s infinite;
      margin: 20px 0;
    }

    button {
      margin-top: 20px;
      padding: 14px 35px;
      border: none;
      border-radius: 50px;
      background: white;
      color: #ff4d6d;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: scale(1.08);
      background: #fff0f5;
    }

    .floating {
      position: absolute;
      bottom: -100px;
      animation: floatUp linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes beat {
      0%,100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message {
      display: none;
      margin-top: 20px;
      font-size: 1.3rem;
      color: #fffde7;
      animation: fadeIn 1s ease;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎉 Happy Birthday 🎂</h1>
    <h2>Chúc Mừng Sinh Nhật Chị Iêu 💖</h2>

    <div class="heart">💝</div>


    <button onclick="showMessage()">Nhấn vào đây 💌</button>

    <div class="message" id="message">
        Chúc chị có một ngày sinh nhật thật vui vẻ,
      luôn xinh đẹp, hạnh phúc và đạt được mọi điều mong muốn.
      Mong rằng tuổi mới sẽ mang đến cho chị thật nhiều niềm vui và may mắn ❤️<br>
    </div>
  </div>
  <audio id="bg-music" loop>
   <source src="happybirthday.mp3" type="audio/mpeg">
  </audio>

  <script>
    function showMessage() {
      document.getElementById('message').style.display = 'block';
    }

    function createFloatingItem() {
      const item = document.createElement('div');
      item.classList.add('floating');

      const icons = ['🎈', '💖', '✨', '🎂', '🌸'];
      item.innerHTML = icons[Math.floor(Math.random() * icons.length)];

      item.style.left = Math.random() * 100 + 'vw';
      item.style.fontSize = (Math.random() * 30 + 20) + 'px';
      item.style.animationDuration = (Math.random() * 5 + 5) + 's';

      document.body.appendChild(item);

      setTimeout(() => {
        item.remove();
      }, 10000);
    }

    setInterval(createFloatingItem, 300);
    window.addEventListener('click', () => {
    const music = document.getElementById('bg-music');
    music.play();
}, { once: true });
  </script>

</body>
</html>
